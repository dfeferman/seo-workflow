services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seo_workflow
      POSTGRES_USER: seo_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo_user -d seo_workflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3001"
    environment:
      DATABASE_URL: postgresql://seo_user:${DB_PASSWORD}@db:5432/seo_workflow
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: ${PORT:-3001}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
