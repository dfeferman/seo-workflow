# Hinweis: postgres_data wird nur beim ersten Start aus server/db/schema.sql initialisiert.
# Nach Schema-Änderungen: `docker compose down -v` (löscht DB) oder Migrationen manuell in Postgres ausführen.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seo_workflow
      POSTGRES_USER: seo_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo_user -d seo_workflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3003"
    environment:
      DATABASE_URL: postgresql://seo_user:${DB_PASSWORD}@db:5432/seo_workflow
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: ${PORT:-3003}
      # http://localhost ohne TLS: Browser akzeptieren Secure-Cookies oft nicht → Session/Refresh bricht
      COOKIE_SECURE: "false"
      # Browser-Origin beim Zugriff auf http://localhost:3000 (CORS nur relevant bei getrenntem Frontend)
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
